<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول - PharmaFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="manifest" href="manifest.json">

    <meta
        name="theme-color"
        content="#2563eb">
    <script src="https://unpkg.com/dexie@4/dist/dexie.js"></script>
    <script src="js/offline-db.js"></script>
    <script src="js/pwa.js"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center h-screen">

<div id="app" class="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl">
    <div id="offlineOverlay"
     class="fixed inset-0 bg-white z-[9999] hidden flex items-center justify-center">

    <div class="text-center">

        <div class="text-7xl mb-6">
            📡
        </div>

        <h2 class="text-2xl font-bold text-red-600 mb-4">

            لا يوجد اتصال بالإنترنت

        </h2>

        <p class="text-slate-600 mb-8">

            يجب تسجيل الدخول مرة واحدة بالإنترنت
            قبل استخدام النظام دون اتصال.

        </p>

        <button id="retryConnection"

                class="bg-emerald-600 text-white px-8 py-3 rounded-xl">

            إعادة المحاولة

        </button>

    </div>

</div>
    <!-- Login Form -->
    <div v-if="!showReset">
        <h2 class="text-2xl font-bold text-emerald-800 mb-6 text-center">تسجيل الدخول</h2>
        <form @submit.prevent="login" class="space-y-4">
            <input v-model="form.email" type="email" placeholder="البريد الإلكتروني" required class="w-full p-3 border rounded-lg">
            <input v-model="form.password" type="password" placeholder="كلمة المرور" required class="w-full p-3 border rounded-lg">
            <button :disabled="loading" class="w-full bg-emerald-600 text-white py-3 rounded-lg font-bold">
                {{ loading ? 'جاري الدخول...' : 'دخول' }}
            </button>
        </form>
        <button @click="showReset = true" class="mt-4 w-full text-sm text-slate-500 hover:text-emerald-600">نسيت كلمة المرور؟</button>
    </div>

    <!-- Forgot Password Request -->
    <div v-else>
        <h2 class="text-xl font-bold text-emerald-800 mb-4">استعادة كلمة المرور</h2>
        <p class="text-sm text-gray-600 mb-4">أدخل بريدك الإلكتروني لإرسال رابط إعادة التعيين.</p>
        <input v-model="resetEmail" type="email" placeholder="البريد الإلكتروني" class="w-full p-3 border rounded-lg mb-4">
        <button @click="sendResetLink" class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold">إرسال الرابط</button>
        <button @click="showReset = false" class="mt-4 w-full text-gray-500 text-sm">عودة لتسجيل الدخول</button>
    </div>
</div>

<script>
    const { createApp, ref } = Vue;
    async function hashPassword(password)
    {
        const data =
            new TextEncoder()
                .encode(password);
    
        const hash =
            await crypto.subtle.digest(
                'SHA-256',
                data
            );
    
        return Array
            .from(
                new Uint8Array(hash)
            )
            .map(b =>
                b.toString(16)
                 .padStart(2,'0')
            )
            .join('');
    }
    createApp({
        setup() {
            const form = ref({ email: '', password: '' });
            const loading = ref(false);
            const showReset = ref(false);
            const resetEmail = ref('');

            const login = async () => {

            loading.value = true;
        
            try {
        
                if (!navigator.onLine) {
        
                    const user =
                        await getCachedUser();
        
                    if (!user) {
        
                        throw new Error(
                            'يجب تسجيل الدخول مرة واحدة بالإنترنت أولاً'
                        );
        
                    }
        
                    if (
                        user.email.toLowerCase()
                        !==
                        form.value.email.toLowerCase()
                    ) {
        
                        throw new Error(
                            'هذا الحساب غير محفوظ على الجهاز'
                        );
        
                    }
        
                    const passwordHash =
                        await hashPassword(
                            form.value.password
                        );
        
                    if (
                        passwordHash !==
                        user.offline_password_hash
                    ) {
        
                        throw new Error(
                            'كلمة المرور غير صحيحة'
                        );
        
                    }
        
                    localStorage.setItem(
                        'user',
                        JSON.stringify(user)
                    );
        
                    localStorage.setItem(
                        'offline_mode',
                        'true'
                    );
        
                    window.location.href =
                        user.role === 'admin'
                            ? 'admin.html'
                            : 'pos.html';
        
                    return;
                }
        
                const res =
                    await axios.post(
                        'https://pharmaflow-api-dev.onrender.com/api/login',
                        form.value
                    );
        
                const passwordHash =
                    await hashPassword(
                        form.value.password
                    );
        
                await cacheUser({
        
                    ...res.data.user,
        
                    offline_password_hash:
                        passwordHash,
        
                    cached_at:
                        new Date()
                            .toISOString()
        
                });
        
                localStorage.setItem(
                    'token',
                    res.data.token
                );
        
                localStorage.setItem(
                    'user',
                    JSON.stringify(
                        res.data.user
                    )
                );
        
                localStorage.removeItem(
                    'offline_mode'
                );
        
                window.location.href =
                    res.data.user.role === 'admin'
                        ? 'admin.html'
                        : 'pos.html';
        
            }
            catch (e) {
        
                alert(
                    e.message ||
                    e.response?.data?.message ||
                    'خطأ في بيانات الدخول'
                );
        
            }
            finally {
        
                loading.value = false;
        
            }
        };

            const sendResetLink = async () => {
                try {
                    await axios.post('https://pharmaflow-api-dev.onrender.com/api/forgot-password', { email: resetEmail.value });
                    alert('تم إرسال رابط إعادة التعيين إلى بريدك الإلكتروني');
                    showReset.value = false;
                } catch (e) { alert('تعذر إرسال الرابط، تأكد من البريد الإلكتروني'); }
            };
            // Handle Offline
            const overlay =
                document.getElementById(
                    'offlineOverlay'
                );
            
            const retry =
                document.getElementById(
                    'retryConnection'
                );
            
            async function updateConnectionState() {
            
                const cachedUser =
                    await getCachedUser();
            
                if (
                    navigator.onLine
                ) {
            
                    overlay.classList.add(
                        'hidden'
                    );
            
                    return;
            
                }
            
                if (
                    cachedUser
                ) {
            
                    overlay.classList.add(
                        'hidden'
                    );
            
                    return;
            
                }
            
                overlay.classList.remove(
                    'hidden'
                );
            
            }
            
            window.addEventListener(
                'online',
                updateConnectionState
            );
            
            window.addEventListener(
                'offline',
                updateConnectionState
            );
            
            retry.addEventListener(
                'click',
                updateConnectionState
            );
            
            updateConnectionState();
            return { form, login, loading, showReset, resetEmail, sendResetLink };
        }
    }).mount('#app');
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تعيين كلمة مرور جديدة - PharmaFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="manifest" href="manifest.json">

    <meta
        name="theme-color"
        content="#2563eb">

    <script src="js/pwa.js"></script>
</head>

<body class="bg-slate-100 flex items-center justify-center h-screen">

<div id="app" class="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl">
    <h2 class="text-2xl font-bold text-emerald-800 mb-6 text-center">تعيين كلمة مرور جديدة</h2>
    
    <form @submit.prevent="submitReset" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700">كلمة المرور الجديدة</label>
            <input v-model="form.password" type="password" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none">
        </div>
        
        <div>
            <label class="block text-sm font-medium text-gray-700">تأكيد كلمة المرور</label>
            <input v-model="form.password_confirmation" type="password" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none">
        </div>

        <button :disabled="loading" class="w-full bg-emerald-600 text-white py-3 rounded-lg font-bold hover:bg-emerald-700 transition">
            {{ loading ? 'جاري التحديث...' : 'تحديث كلمة المرور' }}
        </button>
    </form>
</div>

<script>
    const { createApp, ref } = Vue;
    createApp({
        setup() {
            const form = ref({ password: '', password_confirmation: '' });
            const loading = ref(false);
            
            const submitReset = async () => {
                loading.value = true;
                // Get token and email from URL (e.g., reset-password.html?token=xyz&email=a@b.com)
                const params = new URLSearchParams(window.location.search);
                const payload = {
                    ...form.value,
                    email: params.get('email'),
                    token: params.get('token')
                };

                try {
                    await axios.post('https://pharmaflow-api-1-1-0-beta.onrender.com/api/reset-password', payload);
                    alert('تم تغيير كلمة المرور بنجاح! يمكنك الآن تسجيل الدخول.');
                    window.location.href = 'login.html';
                } catch (e) {
                    alert(e.response?.data.message || 'خطأ: الرابط غير صالح أو انتهت صلاحيته');
                } finally {
                    loading.value = false;
                }
            };

            return { form, submitReset, loading };
        }
    }).mount('#app');
</script>
</body>
</html>
